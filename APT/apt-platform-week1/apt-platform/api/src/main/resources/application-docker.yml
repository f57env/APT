# =============================================================================
# Docker profile: activate with SPRING_PROFILES_ACTIVE=docker
# Used when the app runs as a container in Docker Compose.
# Services are reached by their container names, not localhost.
# =============================================================================

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/aptdb      # "postgres" = container name
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  data:
    mongodb:
      uri: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/aptdb?authSource=admin
    redis:
      host: redis                                    # "redis" = container name
      port: 6379
      password: ${REDIS_PASSWORD}

  kafka:
    bootstrap-servers: kafka:29092                  # internal Docker listener
