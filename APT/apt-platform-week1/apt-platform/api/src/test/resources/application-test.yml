# =============================================================================
# Test profile — activated automatically during mvn test
# Uses embedded Kafka (no Docker) and mocks external services.
# =============================================================================

spring:
  # Use H2 in-memory database for fast unit/slice tests that need JPA
  # Integration tests (Testcontainers) override this with a real PostgreSQL
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop   # H2: let Hibernate manage schema in tests
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false   # Disable Flyway for unit tests — H2 + ddl-auto handles it

  # Embedded MongoDB for repository tests
  data:
    mongodb:
      uri: mongodb://localhost:27017/testdb
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}  # Provided by @EmbeddedKafka

# Keep JWT simple in tests
app:
  jwt:
    secret: test-secret-key-must-be-at-least-256-bits-long-for-HS512-algorithm
    expiration-ms: 3600000  # 1 hour

  kafka:
    simulation:
      events-per-second: 1
      apt-injection-rate: 0.1

  detection:
    gaussian-epsilon: 0.001
    autoencoder-threshold: 0.15
    three-sigma-multiplier: 3.0

logging:
  level:
    com.apt: DEBUG
    org.springframework.kafka: WARN
    org.hibernate: WARN
